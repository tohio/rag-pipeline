<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg" width="880" height="420" font-family="JetBrains Mono, monospace">

      <!-- ── Defs ── -->
      <defs>
        <marker id="arrow1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#888882"/>
        </marker>
        <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
        </marker>
      </defs>

      <!-- ══ LAYER BACKGROUNDS ══ -->
      <!-- Ingestion -->
      <rect x="10" y="10" width="200" height="390" rx="8" fill="#fef9f0" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
      <text x="110" y="30" text-anchor="middle" font-size="10" fill="#f59e0b" letter-spacing="0.08em" font-weight="600">INGESTION</text>

      <!-- Embedding -->
      <rect x="225" y="10" width="130" height="390" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
      <text x="290" y="30" text-anchor="middle" font-size="10" fill="#22c55e" letter-spacing="0.08em" font-weight="600">EMBEDDING</text>

      <!-- Vector Store -->
      <rect x="370" y="10" width="140" height="390" rx="8" fill="#fdf4ff" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
      <text x="440" y="30" text-anchor="middle" font-size="10" fill="#a855f7" letter-spacing="0.08em" font-weight="600">VECTOR STORE</text>

      <!-- Retrieval -->
      <rect x="525" y="10" width="140" height="390" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
      <text x="595" y="30" text-anchor="middle" font-size="10" fill="#f97316" letter-spacing="0.08em" font-weight="600">RETRIEVAL</text>

      <!-- Generation + UI -->
      <rect x="680" y="10" width="190" height="390" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
      <text x="775" y="30" text-anchor="middle" font-size="10" fill="#0ea5e9" letter-spacing="0.08em" font-weight="600">GENERATION + UI</text>

      <!-- ══ NODES ══ -->

      <!-- Input: PDF -->
      <rect x="30" y="55" width="160" height="48" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="110" y="74" text-anchor="middle" font-size="11" fill="#1a1a18" font-weight="600">PDF Documents</text>
      <text x="110" y="89" text-anchor="middle" font-size="9" fill="#888882">data/raw/*.pdf</text>

      <!-- Loader -->
      <rect x="30" y="135" width="160" height="48" rx="6" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="110" y="154" text-anchor="middle" font-size="11" fill="#1a1a18" font-weight="600">loader.py</text>
      <text x="110" y="169" text-anchor="middle" font-size="9" fill="#888882">LlamaIndex SimpleDirectoryReader</text>

      <!-- Chunker -->
      <rect x="30" y="215" width="160" height="48" rx="6" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="110" y="234" text-anchor="middle" font-size="11" fill="#1a1a18" font-weight="600">chunker.py</text>
      <text x="110" y="249" text-anchor="middle" font-size="9" fill="#888882">SentenceSplitter 512/50</text>

      <!-- Config note -->
      <rect x="30" y="305" width="160" height="36" rx="6" fill="#fef9f0" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="110" y="320" text-anchor="middle" font-size="9" fill="#888882">chunk_size, chunk_overlap</text>
      <text x="110" y="333" text-anchor="middle" font-size="9" fill="#888882">configurable via .env</text>

      <!-- Embedder -->
      <rect x="243" y="135" width="94" height="48" rx="6" fill="white" stroke="#22c55e" stroke-width="1.5"/>
      <text x="290" y="154" text-anchor="middle" font-size="11" fill="#1a1a18" font-weight="600">embedder.py</text>
      <text x="290" y="169" text-anchor="middle" font-size="9" fill="#888882">text-embedding-3-small</text>

      <!-- Embed note -->
      <rect x="243" y="220" width="94" height="36" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="290" y="235" text-anchor="middle" font-size="9" fill="#888882">1536 dims</text>
      <text x="290" y="248" text-anchor="middle" font-size="9" fill="#888882">cosine similarity</text>

      <!-- Vector Store -->
      <rect x="388" y="135" width="104" height="48" rx="6" fill="white" stroke="#a855f7" stroke-width="1.5"/>
      <text x="440" y="154" text-anchor="middle" font-size="11" fill="#1a1a18" font-weight="600">store.py</text>
      <text x="440" y="169" text-anchor="middle" font-size="9" fill="#888882">Chroma (local)</text>

      <!-- Store note -->
      <rect x="388" y="220" width="104" height="36" rx="6" fill="#fdf4ff" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="440" y="235" text-anchor="middle" font-size="9" fill="#888882">PersistentClient</text>
      <text x="440" y="248" text-anchor="middle" font-size="9" fill="#888882">warm/cold start</text>

      <!-- Retriever -->
      <rect x="543" y="135" width="104" height="48" rx="6" fill="white" stroke="#f97316" stroke-width="1.5"/>
      <text x="595" y="154" text-anchor="middle" font-size="11" fill="#1a1a18" font-weight="600">retriever.py</text>
      <text x="595" y="169" text-anchor="middle" font-size="9" fill="#888882">top-k + score cutoff</text>

      <!-- User query input -->
      <rect x="543" y="55" width="104" height="48" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="595" y="74" text-anchor="middle" font-size="11" fill="#1a1a18" font-weight="600">User Query</text>
      <text x="595" y="89" text-anchor="middle" font-size="9" fill="#888882">natural language</text>

      <!-- Generator -->
      <rect x="698" y="135" width="154" height="48" rx="6" fill="white" stroke="#0ea5e9" stroke-width="1.5"/>
      <text x="775" y="154" text-anchor="middle" font-size="11" fill="#1a1a18" font-weight="600">generator.py</text>
      <text x="775" y="169" text-anchor="middle" font-size="9" fill="#888882">GPT-4o · RAG_PROMPT</text>

      <!-- UI -->
      <rect x="698" y="220" width="154" height="48" rx="6" fill="white" stroke="#ef4444" stroke-width="1.5"/>
      <text x="775" y="239" text-anchor="middle" font-size="11" fill="#1a1a18" font-weight="600">app.py</text>
      <text x="775" y="254" text-anchor="middle" font-size="9" fill="#888882">Gradio UI</text>

      <!-- Eval -->
      <rect x="698" y="305" width="154" height="48" rx="6" fill="white" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="775" y="324" text-anchor="middle" font-size="11" fill="#888882" font-weight="600">eval.py</text>
      <text x="775" y="339" text-anchor="middle" font-size="9" fill="#888882">faithfulness · relevance · latency</text>

      <!-- ══ ARROWS — Build time ══ -->
      <!-- PDF → loader -->
      <line x1="110" y1="103" x2="110" y2="131" stroke="#888882" stroke-width="1.5" marker-end="url(#arrow1)"/>
      <!-- loader → chunker -->
      <line x1="110" y1="183" x2="110" y2="211" stroke="#888882" stroke-width="1.5" marker-end="url(#arrow1)"/>
      <!-- chunker → embedder -->
      <line x1="190" y1="239" x2="239" y2="200" stroke="#888882" stroke-width="1.5" marker-end="url(#arrow1)"/>
      <!-- embedder → store -->
      <line x1="337" y1="159" x2="384" y2="159" stroke="#888882" stroke-width="1.5" marker-end="url(#arrow1)"/>

      <!-- ══ ARROWS — Query time ══ -->
      <!-- query → embedder (dashed blue) -->
      <line x1="595" y1="103" x2="595" y2="131" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)" stroke-dasharray="5,3"/>
      <!-- query embed → store (dashed blue) -->
      <path d="M 543 159 L 496 159" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)" stroke-dasharray="5,3" fill="none"/>
      <!-- store → retriever -->
      <line x1="492" y1="159" x2="539" y2="159" stroke="#888882" stroke-width="1.5" marker-end="url(#arrow1)"/>
      <!-- retriever → generator -->
      <line x1="647" y1="159" x2="694" y2="159" stroke="#888882" stroke-width="1.5" marker-end="url(#arrow1)"/>

      <!-- generator → UI -->
      <line x1="775" y1="183" x2="775" y2="216" stroke="#888882" stroke-width="1.5" marker-end="url(#arrow1)"/>

      <!-- ══ LABELS on arrows ══ -->
      <text x="155" y="122" font-size="9" fill="#888882">LlamaIndex docs</text>
      <text x="155" y="202" font-size="9" fill="#888882">nodes / chunks</text>
      <text x="344" y="150" font-size="9" fill="#888882">vectors</text>
      <text x="648" y="150" font-size="9" fill="#888882">context</text>

      <!-- build vs query time legend inside diagram -->
      <line x1="30" y1="385" x2="55" y2="385" stroke="#888882" stroke-width="1.5"/>
      <text x="60" y="389" font-size="9" fill="#888882">build time</text>
      <line x1="120" y1="385" x2="145" y2="385" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="150" y="389" font-size="9" fill="#3b82f6">query time</text>

    </svg>